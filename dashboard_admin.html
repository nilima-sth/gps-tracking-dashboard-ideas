<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fleet Admin Command Center – Unilever Nepal</title>
<meta name="description" content="Unilever Nepal fleet operations command center – real-time truck dispatch, GPS tracking, and cargo management dashboard."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
/* ================================================================
   RESET & BASE
================================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:13px;height:100%;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F1F5F9;color:#1E293B;height:100%;overflow:hidden;}

:root{
  --purple:#714B67;--purple-dark:#5a3a52;--purple-light:#f3eef1;--purple-mid:#d9c8d4;
  --teal:#1D9E75;--teal-light:#e8f7f2;--teal-dark:#157a5b;
  --amber:#F0A500;--amber-light:#fef7e6;
  --blue:#3B82F6;--blue-light:#EFF6FF;
  --red:#EF4444;--red-light:#FEF2F2;
  --border:#E2E8F0;--text:#1E293B;--text-muted:#64748B;
  --bg:#F1F5F9;--white:#FFFFFF;
  --sidebar-w:220px;--topbar-h:48px;
}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#94A3B8;}

/* ================================================================
   TOPBAR
================================================================ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:var(--purple);display:flex;align-items:center;
  padding:0 16px;z-index:1000;gap:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.topbar-logo{color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.topbar-logo .badge{background:rgba(255,255,255,.18);color:#fff;font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:10px;}
.topbar-div{width:1px;height:22px;background:rgba(255,255,255,.22);flex-shrink:0;}
.topbar-fleet{display:flex;align-items:center;gap:14px;font-size:11px;color:rgba(255,255,255,.8);}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;display:inline-block;animation:blink 1.4s infinite;margin-right:3px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.topbar-clock{text-align:right;}
.topbar-clock .tc-time{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:#fff;}
.topbar-clock .tc-date{font-size:9.5px;color:rgba(255,255,255,.55);}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.8);font-size:14px;transition:.15s;position:relative;}
.icon-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.icon-btn .dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:#EF4444;border:1.5px solid var(--purple);}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:var(--amber);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ================================================================
   SIDEBAR
================================================================ */
.sidebar{
  position:fixed;top:var(--topbar-h);left:0;bottom:0;
  width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);
  overflow-y:auto;z-index:900;display:flex;flex-direction:column;
}
.sidebar-section{padding:10px 0 4px;}
.sidebar-label{font-size:9.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.9px;padding:4px 14px 6px;}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;color:var(--text);font-size:12px;font-weight:500;border-left:3px solid transparent;transition:.12s;user-select:none;}
.nav-item:hover{background:var(--purple-light);color:var(--purple);}
.nav-item.active{background:var(--purple-light);color:var(--purple);border-left-color:var(--purple);font-weight:700;}
.nav-item-left{display:flex;align-items:center;gap:8px;}
.nav-icon{font-size:13px;width:16px;text-align:center;}
.nbadge{font-size:9px;font-weight:700;padding:1.5px 6px;border-radius:10px;}
.nbadge-red{background:var(--red);color:#fff;}
.nbadge-green{background:var(--teal);color:#fff;}
.nbadge-blue{background:var(--blue);color:#fff;}
.nbadge-outline{background:var(--bg);color:var(--text-muted);border:1px solid var(--border);}
.sidebar-footer{margin-top:auto;padding:11px 12px;border-top:1px solid var(--border);background:var(--bg);}
.sidebar-footer .sf-label{font-size:9.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.sidebar-footer select{width:100%;font-size:11.5px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;}

/* ================================================================
   MAIN CONTENT
================================================================ */
.main-content{position:fixed;top:var(--topbar-h);left:var(--sidebar-w);right:0;bottom:0;overflow:hidden;display:flex;flex-direction:column;}
#main-viewport{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;}

/* ================================================================
   COMMON COMPONENTS
================================================================ */
/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.card-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#FAFAFA;border-radius:8px 8px 0 0;}
.card-title{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}

/* KPI Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.kpi-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.kpi-icon.purple{background:var(--purple-light);}
.kpi-icon.teal{background:var(--teal-light);}
.kpi-icon.red{background:var(--red-light);}
.kpi-icon.amber{background:var(--amber-light);}
.kpi-val{font-size:20px;font-weight:800;color:var(--text);line-height:1.1;}
.kpi-label{font-size:11px;font-weight:600;color:var(--text-muted);margin-top:1px;}
.kpi-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}

/* Tables */
.data-table{width:100%;border-collapse:collapse;}
.data-table thead th{background:#F8FAFC;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
.data-table tbody tr{border-bottom:1px solid #F1F5F9;transition:background .1s;}
.data-table tbody tr:hover{background:#F8FAFC;}
.data-table tbody tr.selected{background:var(--purple-light) !important;border-left:3px solid var(--purple);}
.data-table tbody td{padding:9px 12px;font-size:11.5px;vertical-align:middle;}
.data-table tbody tr:last-child{border-bottom:none;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;border:1px solid;}
.badge-green{background:#F0FDF4;color:#166534;border-color:#BBF7D0;}
.badge-red{background:#FEF2F2;color:#991B1B;border-color:#FECACA;}
.badge-amber{background:#FFFBEB;color:#92400E;border-color:#FDE68A;}
.badge-blue{background:#EFF6FF;color:#1D4ED8;border-color:#BFDBFE;}
.badge-slate{background:#F8FAFC;color:#475569;border-color:#CBD5E1;}
.badge-purple{background:var(--purple-light);color:var(--purple);border-color:var(--purple-mid);}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;font-family:'DM Sans',sans-serif;line-height:1;}
.btn-primary{background:var(--purple);color:#fff;}
.btn-primary:hover{background:var(--purple-dark);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{background:var(--bg);}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid #FECACA;}
.btn-danger:hover{background:#FEE2E2;}
.btn-sm{padding:4px 9px;font-size:11px;border-radius:5px;}

/* Page layout */
.page-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;background:var(--white);}
.page-title{font-size:16px;font-weight:800;color:var(--text);}
.page-subtitle{font-size:11px;color:var(--text-muted);margin-top:2px;}
.page-body{padding:16px 18px;flex:1;}

/* Inspector / Dispatch dual-pane */
.dispatch-layout{display:flex;height:100%;overflow:hidden;flex:1;}
.dispatch-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.dispatch-inspector{width:390px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.insp-header{padding:12px 14px;border-bottom:1px solid var(--border);background:#FAFAFA;}
.insp-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 6px;background:var(--white);overflow-x:auto;}
.insp-tab{padding:8px 11px;font-size:11.5px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:.12s;white-space:nowrap;flex-shrink:0;}
.insp-tab:hover{color:var(--purple);}
.insp-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.insp-body{flex:1;overflow-y:auto;padding:14px;}

/* Timeline */
.timeline{position:relative;padding-left:26px;}
.timeline::before{content:'';position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--border);}
.tl-item{position:relative;margin-bottom:18px;}
.tl-item:last-child{margin-bottom:0;}
.tl-dot{position:absolute;left:-26px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid;z-index:1;}
.tl-dot-done{background:var(--teal);border-color:var(--teal-dark);color:#fff;}
.tl-dot-current{background:var(--blue);border-color:#1D4ED8;color:#fff;animation:blink 1.4s infinite;}
.tl-dot-pending{background:var(--white);border-color:var(--border);color:var(--text-muted);}
.tl-name{font-size:12px;font-weight:700;color:var(--text);}
.tl-meta{font-size:10.5px;color:var(--text-muted);display:flex;justify-content:space-between;margin-top:2px;}

/* Stat rows */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:11.5px;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--text-muted);font-weight:500;}
.stat-val{font-weight:700;font-family:'DM Mono',monospace;}

/* Fuel bar */
.fuel-bar-wrap{display:flex;align-items:center;gap:6px;}
.fuel-bar-bg{flex:1;height:5px;background:#E5E7EB;border-radius:3px;overflow:hidden;}
.fuel-bar-fill{height:100%;border-radius:3px;}
.fuel-pct{font-size:10.5px;font-weight:700;font-family:'DM Mono',monospace;}

/* Terminal cards */
.terminal-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:10px;}
.terminal-card{border:1px solid var(--border);border-radius:7px;padding:11px;}
.terminal-name{font-size:10.5px;font-weight:700;color:var(--text-muted);}
.terminal-count{font-size:15px;font-weight:800;color:var(--text);margin-top:2px;}
.terminal-weather{font-size:10px;color:var(--text-muted);margin-top:4px;}

/* Event log */
.elog{font-family:'DM Mono',monospace;font-size:10.5px;display:flex;flex-direction:column;gap:0;}
.elog-item{padding:7px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;}
.elog-item:last-child{border-bottom:none;}
.elog-time{color:var(--text-muted);flex-shrink:0;}
.elog-bar{width:2px;border-radius:2px;flex-shrink:0;min-height:14px;margin-top:2px;}

/* Alert item */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);}
.alert-item:last-child{border-bottom:none;}
.alert-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}

/* Driver card */
.driver-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;transition:.15s;}
.driver-card:hover{border-color:var(--purple-mid);box-shadow:0 2px 8px rgba(113,75,103,.1);}
.driver-avatar{width:40px;height:40px;border-radius:50%;background:var(--purple-light);color:var(--purple);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* Cargo rows */
.cargo-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:11.5px;}
.cargo-row:last-child{border-bottom:none;}

/* Map */
.map-page-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.map-toolbar{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--white);display:flex;align-items:center;gap:10px;flex-shrink:0;}
#leaflet-map{flex:1;min-height:0;}
.leaflet-popup-content-wrapper{border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);border:1px solid var(--border);}
.leaflet-popup-content{margin:10px 12px;}
.custom-truck-marker{background:none;border:none;}
.custom-station-marker{background:none;border:none;}

/* Search */
.search-wrap{position:relative;}
.search-wrap input{padding:6px 10px 6px 28px;border:1px solid var(--border);border-radius:6px;font-size:11.5px;font-family:'DM Sans',sans-serif;width:210px;background:#fff;color:var(--text);}
.search-wrap input:focus{outline:none;border-color:var(--purple);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-muted);}

/* Forms */
.form-group{margin-bottom:10px;}
.form-label{display:block;font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
.form-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;}
.form-input:focus{outline:none;border-color:var(--purple);}
textarea.form-input{resize:vertical;min-height:60px;}

/* Mini metric box */
.mini-metric{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;}
.mini-metric-label{font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.mini-metric-val{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;margin-top:1px;}
.mini-metric-sub{font-size:9px;color:var(--text-muted);margin-top:1px;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1E293B;color:#fff;padding:10px 16px;border-radius:8px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
.toast-icon{width:22px;height:22px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.toast-title{font-weight:700;font-size:12px;}
.toast-desc{font-size:10.5px;color:rgba(255,255,255,.65);}
</style>
</head>
<body>

<!-- ════════════════════════════════ TOPBAR ════════════════════════════════ -->
<header class="topbar">
  <div class="topbar-logo">
    <span><i class="fa-solid fa-truck-fast"></i></span>
    <span>Unilever Nepal</span>
  </div>
  <div class="topbar-right">
    <div class="topbar-clock">
      <div class="tc-time" id="live-clock">12:00:00 PM</div>
      <div class="tc-date" id="live-date">Thursday, 17 July 2026</div>
    </div>
    <div class="icon-btn" onclick="switchPage('alerts')" title="Alerts Inbox">
      <i class="fa-solid fa-bell"></i><span class="dot"></span>
    </div>
  </div>
</header>

<!-- ════════════════════════════════ SIDEBAR ════════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Fleet Operations</div>
    <div class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-chart-simple"></i></span>Dashboard</div>
      <span class="nbadge nbadge-outline">Live</span>
    </div>
    <div class="nav-item" id="nav-dispatch" onclick="switchPage('dispatch')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-list-check"></i></span>Dispatch Board</div>
      <span class="nbadge nbadge-blue" id="sb-dispatch-badge">7 Active</span>
    </div>
    <div class="nav-item" id="nav-map" onclick="switchPage('map')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-map-location-dot"></i></span>Live Map</div>
      <span class="nbadge nbadge-green">Track</span>
    </div>
    <div class="nav-item" id="nav-routes" onclick="switchPage('routes')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-route"></i></span>Routes</div>
    </div>
    <div class="nav-item" id="nav-drivers" onclick="switchPage('drivers')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-id-card"></i></span>Drivers</div>
    </div>
    <div class="nav-item" id="nav-trips" onclick="switchPage('trips')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-calendar-day"></i></span>Today's Trips</div>
    </div>
  </div>
  <div class="sidebar-section" style="border-top:1px solid var(--border);margin-top:2px;padding-top:8px;">
    <div class="sidebar-label">Management &amp; Intel</div>
    <div class="nav-item" id="nav-alerts" onclick="switchPage('alerts')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-triangle-exclamation"></i></span>Alerts Inbox</div>
      <span class="nbadge nbadge-red" id="sb-alerts-badge">4 Active</span>
    </div>
    <div class="nav-item" id="nav-reports" onclick="switchPage('reports')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-chart-pie"></i></span>Reports</div>
    </div>
    <div class="nav-item" id="nav-settings" onclick="switchPage('settings')">
      <div class="nav-item-left"><span class="nav-icon"><i class="fa-solid fa-sliders"></i></span>Settings</div>
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="sf-label">Depot Filter</div>
    <select id="depot-select" onchange="filterDepot(this.value)">
      <option value="all">All Depots</option>
      <option value="Kathmandu">Kathmandu HQ</option>
      <option value="Hetauda">Hetauda Station</option>
      <option value="Birgunj">Birgunj Station</option>
      <option value="Pokhara">Pokhara Station</option>
      <option value="Nepalgunj">Nepalgunj Station</option>
    </select>
  </div>
</aside>

<!-- ════════════════════════════════ MAIN CONTENT ════════════════════════════════ -->
<main class="main-content">
  <div id="main-viewport"></div>
</main>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon"><i class="fa-solid fa-check"></i></div>
  <div>
    <div class="toast-title" id="toast-title">Success</div>
    <div class="toast-desc" id="toast-desc">Action completed.</div>
  </div>
</div>

<!-- ════════════════════════════════ SCRIPTS ════════════════════════════════ -->
<script>
/* ================================================================
   APP STATE
================================================================ */
const S = {
  page: 'dashboard',
  activeId: 'TR-001',
  tab: 'timeline',
  depot: 'all',
  q: '',
  weather: {
    KTM:  { temp:'24°C', cond:'Light Rain',    icon:'<i class="fa-solid fa-cloud-showers-heavy text-info"></i>' },

/* ================================================================
   CLOCK
================================================================ */
function tick() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const p = n => String(n).padStart(2,'0');
  const cl = document.getElementById('live-clock');
  const dl = document.getElementById('live-date');
  if (cl) cl.textContent = `${p(h)}:${p(m)}:${p(s)} ${ap}`;
  if (dl) dl.textContent = now.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(tick, 1000); tick();

/* ================================================================
   ROUTER
================================================================ */
function switchPage(id) {
  S.page = id;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const nb = document.getElementById(`nav-${id}`);
  if (nb) nb.classList.add('active');
  render();
}

function filterDepot(val) {
  S.depot = val;
  showToast('Depot Filter Applied', val === 'all' ? 'Showing all depots' : `Filtered to: ${val}`);
  render();
}

function render() {
  const vp = document.getElementById('main-viewport');
  const active = S.trucks.filter(t => S.depot === 'all' || t.origin === S.depot || t.dest === S.depot);
  const elActive = document.getElementById('hdr-active');
  const elAlerts = document.getElementById('hdr-alerts');
  if (elActive) {
    elActive.textContent = `${active.filter(t=>t.sc==='green').length} On Schedule · ${active.filter(t=>t.sc==='red').length} Delayed`;
  }
  if (elAlerts) {
    elAlerts.textContent = `${S.alerts.length} Alerts`;
  }

  if (S.page === 'map') {
    vp.innerHTML = mapPageHTML();
    setTimeout(initLeaflet, 200);
    return;
  }
  const fn = {
    dashboard: dashboardHTML, dispatch: dispatchHTML,
    routes: routesHTML, drivers: driversHTML, trips: tripsHTML,
    alerts: alertsHTML, reports: reportsHTML, settings: settingsHTML
  }[S.page];
  vp.innerHTML = fn ? fn() : '<div style="padding:40px;color:var(--text-muted);text-align:center;">Page not found.</div>';
}

/* ================================================================
   TOAST
================================================================ */
function showToast(title, desc) {
  const t = document.getElementById('toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-desc').textContent = desc;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

/* ================================================================
   HELPERS
================================================================ */
function getMetrics() {
  const trucks = S.trucks;
  const active = trucks.filter(t=>t.sc==='green').length;
  const delayed = trucks.filter(t=>t.sc==='red').length;
  const alerts = S.alerts.length;
  let totalKg = 0;
  trucks.forEach(t => t.cargo.forEach(c => { totalKg += parseFloat(c.wt); }));
  return { active, delayed, alerts, total: trucks.length, totalKg: Math.round(totalKg) };
}

function sBadge(t) {
  const cls = { green:'badge-green', red:'badge-red', amber:'badge-amber' }[t.sc] || 'badge-slate';
  return `<span class="badge ${cls}">${t.status}</span>`;
}

function fuelBar(pct) {
  const color = pct < 25 ? '#EF4444' : pct < 50 ? '#F0A500' : '#1D9E75';
  return `<div class="fuel-bar-wrap">
    <div class="fuel-bar-bg"><div class="fuel-bar-fill" style="width:${pct}%;background:${color};"></div></div>
    <span class="fuel-pct" style="color:${color};">${pct}%</span>
  </div>`;
}

function scoreColor(s) {
  return s >= 90 ? 'var(--teal)' : s >= 75 ? 'var(--amber)' : 'var(--red)';
}

function miniMetric(label, val, sub, color) {
  return `<div class="mini-metric">
    <div class="mini-metric-label">${label}</div>
    <div class="mini-metric-val" style="color:${color||'var(--text)'};">${val}</div>
    <div class="mini-metric-sub">${sub}</div>
  </div>`;
}

            </div>
            <div style="text-align:right;">
              <div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-bottom:4px;">

function inspTabHTML(t) {
  if (S.tab === 'timeline') {
    const dots = t.timeline.map(s => {
      const dc = s.status==='Departed'?'tl-dot-done':s.status==='Current'?'tl-dot-current':'tl-dot-pending';
      const ic = s.status==='Departed'?'✓':s.status==='Current'?'→':'○';
      return `<div class="tl-item">
        <div class="tl-dot ${dc}">${ic}</div>
        <div class="tl-name">${s.name}</div>
        <div class="tl-meta">
          <span>Sched: ${s.sched} · Actual: ${s.actual}</span>
          <span style="color:${s.delay>0?'var(--red)':'var(--teal)'};">${s.delay>0?`+${s.delay}m`:'On time'}</span>
        </div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:1px;">${s.dist}</div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;">
      <div style="display:flex;justify-content:space-between;font-size:11.5px;"><span style="color:var(--text-muted);">Next Stop:</span><span style="font-weight:700;">${t.nextStop}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;margin-top:4px;"><span style="color:var(--text-muted);">ETA:</span><span style="font-weight:700;color:${t.delay>0?'var(--red)':'var(--teal)'};">${t.eta}</span></div>
    </div>
    <div class="timeline">${dots}</div>`;
  }

  if (S.tab === 'telemetry') {
    const ec = t.engine==='Normal'||t.engine==='Idle'?'var(--teal)':'var(--amber)';
    return `<div style="display:flex;flex-direction:column;gap:12px;">
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px;">
        <div style="font-size:11.5px;font-weight:700;margin-bottom:8px;"><i class="fa-solid fa-gauge-high text-primary"></i> Live Performance</div>
        <div class="stat-row"><span class="stat-label">Current Speed</span><span class="stat-val" style="color:${t.speed>80?'var(--red)':'var(--text)'};">${t.speed} km/h</span></div>
        <div class="stat-row"><span class="stat-label">Max Speed (Trip)</span><span class="stat-val">${t.maxSpd} km/h</span></div>
        <div class="stat-row"><span class="stat-label">Average Speed</span><span class="stat-val">${t.avgSpd} km/h</span></div>
        <div class="stat-row"><span class="stat-label">Continuous Drive</span><span class="stat-val">${t.drive}</span></div>
        <div class="stat-row"><span class="stat-label">Idle Duration</span><span class="stat-val">${t.idle}</span></div>
      </div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px;">
        <div style="font-size:11.5px;font-weight:700;margin-bottom:8px;"><i class="fa-solid fa-shield-halved text-teal"></i> Safety &amp; Mechanical</div>
        <div class="stat-row"><span class="stat-label">Driver Safety Score</span><span class="stat-val" style="color:${scoreColor(t.score)};">${t.score} / 100</span></div>
        <div class="stat-row"><span class="stat-label">Brake Condition</span><span class="stat-val">${t.brakes}</span></div>
        <div class="stat-row"><span class="stat-label">Tyre Status</span><span class="stat-val">${t.tyres}</span></div>
        <div class="stat-row"><span class="stat-label">Engine Status</span><span class="stat-val" style="color:${ec};">${t.engine}</span></div>
        <div class="stat-row"><span class="stat-label">Overspeed Flags</span><span class="stat-val" style="color:${t.overspd>0?'var(--red)':'var(--teal)'};">${t.overspd} flag(s)</span></div>
        <div class="stat-row"><span class="stat-label">Harsh Braking</span><span class="stat-val" style="color:${t.harsh>0?'var(--amber)':'var(--teal)'};">${t.harsh} event(s)</span></div>
      </div>
    </div>`;
  }

  if (S.tab === 'cargo') {
    const total = t.cargo.reduce((s,c) => s + parseFloat(c.wt), 0);
    const crows = t.cargo.map(c => `<div class="cargo-row">
      <div><div style="font-weight:700;">${c.prod}</div><div style="font-size:10.5px;color:var(--text-muted);">Qty: ${c.qty} units</div></div>
      <div style="text-align:right;"><div style="font-weight:700;font-size:12px;">${c.wt}</div><span class="badge badge-green" style="font-size:9px;">Loaded ✓</span></div>
    </div>`).join('');
    return `<div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:12px;font-weight:700;"><i class="fa-solid fa-box-open"></i> Cargo Manifest</div>
        <span class="badge badge-blue">${total.toFixed(0)} kg Total</span>
      </div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:10px;">${crows}</div>
      <div style="background:var(--teal-light);border:1px solid #b2dfd1;border-radius:6px;padding:10px 12px;font-size:11.5px;">
        <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Distributor:</span><span style="font-weight:700;">${t.dist}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;"><span style="color:var(--text-muted);">Order Ref:</span><span style="font-weight:700;font-family:'DM Mono',monospace;">${t.order}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;"><span style="color:var(--text-muted);">Total Weight:</span><span style="font-weight:800;font-family:'DM Mono',monospace;">${total.toFixed(0)} kg</span></div>
      </div>
    </div>`;
  }

  if (S.tab === 'sms') {
    const logs = t.sms.map(l => `<div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:11px;font-weight:700;">${l.to}</span>
        <span style="font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;">${l.time}</span>
      </div>
      <p style="font-size:11px;color:var(--text-muted);font-style:italic;">"${l.msg}"</p>
      <div style="text-align:right;margin-top:6px;"><span class="badge badge-green" style="font-size:9px;">${l.status}</span></div>
    </div>`).join('');
    return `<form onsubmit="sendSMS(event,'${t.id}')" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:14px;">
      <div class="form-group"><label class="form-label">Dispatch SMS Broadcast</label>
        <textarea id="sms-txt" class="form-input" placeholder="Message to distributor or driver..." required></textarea>
      </div>
      <div style="display:flex;justify-content:flex-end;"><button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-paper-plane"></i> Send Broadcast</button></div>
    </form>
    <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">Communication Logs</div>
    ${logs || '<div style="color:var(--text-muted);font-size:11.5px;text-align:center;padding:20px;">No SMS logs yet.</div>'}`;
  }
  return '';
}

function sendSMS(e, id) {
  e.preventDefault();
  const txt = document.getElementById('sms-txt').value;
  const t = S.trucks.find(x => x.id === id);
  if (t && txt) {
    const now = new Date();
    t.sms.unshift({ time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`, to: t.dist, msg: txt, status: 'Delivered' });
    showToast('SMS Sent', `Broadcast delivered to ${t.dist}`);
    render();
  }
}

function initLeaflet() {
  if (lMap) { try { lMap.remove(); } catch(e){} lMap = null; }
  const el = document.getElementById('leaflet-map');
  if (!el) return;

  lMap = L.map('leaflet-map', { zoomControl: false }).setView([27.7, 84.5], 7.5);
  L.control.zoom({ position: 'topright' }).addTo(lMap);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18, attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(lMap);

  // Station labels
  [
    {name:'KTM HQ', latlng:[27.7172,85.3240]},
    {name:'Hetauda', latlng:[27.4277,85.0315]},
    {name:'Birgunj', latlng:[27.0125,84.8767]},
    {name:'Pokhara', latlng:[28.2096,83.9856]},
    {name:'Butwal',  latlng:[27.7006,83.4484]},
    {name:'Nepalgunj',latlng:[28.0500,81.6167]},
    {name:'Biratnagar',latlng:[26.4525,87.2718]}
  ].forEach(s => {
    L.marker(s.latlng, { icon: L.divIcon({
      html:`<div style="background:rgba(255,255,255,.92);border:1px solid #E2E8F0;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;color:#714B67;box-shadow:0 1px 3px rgba(0,0,0,.12);white-space:nowrap;"><i class="fa-solid fa-warehouse"></i> ${s.name}</div>`,
      className:'custom-station-marker', iconSize:[110,18], iconAnchor:[55,9]
    })}).bindPopup(`<b>${s.name}</b><br/>Unilever Nepal Regional Depot`).addTo(lMap);
  });

  // Truck routes and markers
  S.trucks.forEach(t => {
    if (t.routePts) {
      L.polyline(t.routePts, { color:'#714B67', weight:3, dashArray:'6 5', opacity:0.45 }).addTo(lMap);
    }
    const color = t.sc==='green'?'#1D9E75': t.sc==='red'?'#EF4444':'#F0A500';
    const marker = L.marker(t.latlng, { icon: L.divIcon({
      html:`<div style="background:${color};width:30px;height:30px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;"><i class="fa-solid fa-truck-moving"></i></div>`,
      className:'custom-truck-marker', iconSize:[30,30], iconAnchor:[15,15]
    })}).addTo(lMap);

    const popup = `<div style="font-family:'DM Sans',sans-serif;min-width:170px;">
      <div style="font-weight:800;font-size:12px;color:#714B67;border-bottom:1px solid #E2E8F0;padding-bottom:5px;margin-bottom:7px;">${t.reg}</div>
      <div style="font-size:11px;line-height:1.7;">
        <b>Driver:</b> ${t.driver}<br>
        <b>Route:</b> ${t.routeName}<br>
        <b>Speed:</b> ${t.speed} km/h &nbsp; <b>Fuel:</b> ${t.fuel}%<br>
        <b>Status:</b> ${t.status}<br>
        <b>ETA:</b> ${t.eta}
      </div>
      <button onclick="goDispatch('${t.id}')" style="margin-top:8px;width:100%;padding:5px;background:#714B67;color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">Inspect Truck <i class="fa-solid fa-arrow-right"></i></button>
    </div>`;
    marker.bindPopup(popup);
    marker.on('mouseover', function() { this.openPopup(); });
    marker.on('click', () => { goDispatch(t.id); });
  });
}

function navToStation(code) {
  if (!lMap || !code) { if (lMap) lMap.setView([27.7,84.5],7.5); return; }
  const s = STATIONS[code];
  if (s) {
    lMap.flyTo(s.latlng, s.zoom, { animate: true, duration: 1.5 });
    L.popup().setLatLng(s.latlng).setContent(`<b style="color:#714B67;font-family:'DM Sans',sans-serif;">${s.label}</b><br><span style="font-size:11px;font-family:'DM Sans',sans-serif;">Unilever Nepal Regional Station</span>`).openOn(lMap);
  }
}

function toggleTraffic() {
  if (!lMap) return;
  if (trafficLayer) {
    lMap.removeLayer(trafficLayer);
    trafficLayer = null;
    showToast('Traffic Hidden', 'Highway congestion overlay removed.');
  } else {
    trafficLayer = L.layerGroup();
    L.polyline([[27.78,85.00],[27.7172,85.3240]], { color:'#EF4444', weight:7, opacity:.55 }).addTo(trafficLayer);
    L.polyline([[27.50,85.15],[27.4277,85.0315]], { color:'#F0A500', weight:7, opacity:.55 }).addTo(trafficLayer);
    trafficLayer.addTo(lMap);
    showToast('Traffic Overlay Active', 'Congestion zones now visible on map.');
  }
}
