        // Live Clock Tick
        function updateClock() {
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                const now = new Date();
                let hrs = now.getHours();
                let mins = now.getMinutes();
                let secs = now.getSeconds();
                let ampm = hrs >= 12 ? 'PM' : 'AM';
                hrs = hrs % 12;
                hrs = hrs ? hrs : 12;
                mins = mins < 10 ? '0' + mins : mins;
                secs = secs < 10 ? '0' + secs : secs;
                clockEl.textContent = `${hrs}:${mins}:${secs} ${ampm}`;
            }
        }
        setInterval(updateClock, 1000);

        window.addEventListener('load', () => {
            initApp();
        });

        function initApp() {
            lucide.createIcons();
            switchPage('dashboard');
        }

        function showToast(title, desc) {
            const toast = document.getElementById('success-toast');
            const toastTitle = document.getElementById('toast-title');
            const toastDesc = document.getElementById('toast-desc');
            toastTitle.textContent = title;
            toastDesc.textContent = desc;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }, 3500);
        }

        function switchPage(pageId) {
            appState.currentPage = pageId;
            const sidebarButtons = document.querySelectorAll('aside nav button');
            sidebarButtons.forEach(btn => {
                btn.classList.remove('bg-slate-100', 'text-slate-900', 'font-semibold');
                btn.classList.add('text-slate-700', 'hover:bg-slate-50');
            });

            const activeBtn = document.getElementById(`nav-${pageId}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-700', 'hover:bg-slate-50');
                activeBtn.classList.add('bg-slate-100', 'text-slate-900', 'font-semibold');
            }

            renderActivePage();
            lucide.createIcons();
        }

        function filterTerminalContext(val) {
            appState.countersFilter = val;
            showToast('Counter Filter Applied', `Showing records matching: ${val}`);
            renderActivePage();
            lucide.createIcons();
        }

        function getCalculatedMetrics() {
            let occupiedCount = 0;
            let totalCapacity = 0;
            let totalRevenue = 0;
            let inTransitCount = 0;
            let boardingCount = 0;
            let delayedCount = 0;

            appState.vehicles.forEach(v => {
                if (appState.countersFilter !== 'all' && v.origin !== appState.countersFilter && v.destination !== appState.countersFilter) {
                    return;
                }
                totalCapacity += v.capacity;
                v.seats.forEach(s => {
                    if (s.status === 'occupied' || s.status === 'reserved') {
                        occupiedCount++;
                        totalRevenue += 1550; // Flat price
                    }
                });
                if (v.status === 'In Transit') inTransitCount++;
                if (v.status === 'Boarding') boardingCount++;
                if (v.status === 'Delayed') delayedCount++;
            });

            return { occupiedCount, totalCapacity, totalRevenue, inTransitCount, boardingCount, delayedCount };
        }

    <script>
        let cctvInterval = null;

        function initializeCCTVFeed() {
            if (appState.activeInspectorTab !== 'cctv') {
                if (cctvInterval) clearInterval(cctvInterval);
                return;
            }

            const canvas = document.getElementById('cctv-stream-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (cctvInterval) clearInterval(cctvInterval);

            // Simulated Canvas video frame generator
            cctvInterval = setInterval(() => {
                const now = new Date();
                const clockText = now.toTimeString().split(' ')[0];
                const clockOverlay = document.getElementById('cctv-clock-overlay');
                if (clockOverlay) clockOverlay.textContent = clockText;

                // Clear canvas with deep surveillance monitor grey
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw scanning lines
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;
                for (let y = 0; y < canvas.height; y += 4) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                // Draw vector graphics depending on active channel simulation
                if (appState.cctvChannel === 'cabin') {
                    // Draw Cabin center aisle view
                    ctx.fillStyle = '#334155';
                    ctx.fillRect(80, 40, 160, 120); // Aisle path
                    ctx.fillStyle = '#475569';
                    ctx.fillRect(40, 50, 30, 20); // Seat left 1
                    ctx.fillRect(250, 50, 30, 20); // Seat right 1
                    ctx.fillRect(40, 90, 30, 20); // Seat left 2
                    ctx.fillRect(250, 90, 30, 20); // Seat right 2

                    // Simple vector passengers circles
                    ctx.fillStyle = '#94a3b8';
                    ctx.beginPath();
                    ctx.arc(55, 55, 8, 0, Math.PI * 2);
                    ctx.arc(265, 55, 8, 0, Math.PI * 2);
                    ctx.arc(55, 95, 8, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '7px monospace';
                    ctx.fillText("CABIN CH1 FEED — SECURE LIVE", 20, 20);
                } else if (appState.cctvChannel === 'driver') {
                    // Draw Driver seat steering wheel view
                    ctx.fillStyle = '#334155';
                    ctx.beginPath();
                    ctx.arc(160, 100, 35, 0, Math.PI * 2); // Wheel
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#475569';
                    ctx.stroke();

                    // Center gauge cluster
                    ctx.fillStyle = '#0f172a';
                    ctx.fillRect(110, 40, 100, 25);
                    ctx.fillStyle = '#10b981';
                    ctx.fillRect(120, 48, 20, 4); // Green indicator simulator

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '7px monospace';
                    ctx.fillText("DRIVER CH2 FEED — SYSTEM STATUS", 20, 20);
                } else {
                    // Draw Highway road view out front windshield
                    ctx.fillStyle = '#475569'; // Asphalt road shape
                    ctx.beginPath();
                    ctx.moveTo(160, 50);
                    ctx.lineTo(20, 180);
                    ctx.lineTo(300, 180);
                    ctx.closePath();
                    ctx.fill();

                    // Dashed lines moving down
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([10, 15]);
                    ctx.beginPath();
                    ctx.moveTo(160, 50);
                    ctx.lineTo(160, 180);
                    ctx.stroke();
                    ctx.setLineDash([]); // clear dash

                    ctx.fillStyle = '#ffffff';
                    ctx.font = '7px monospace';
                    ctx.fillText("FRONT WINDSHIELD CH3 FEED", 20, 20);
                }
            }, 300);
        }
    </script>

    <script>
        let leafletMapInstance = null;
        let mapMarkers = [];

        function initGlobalMap() {
            // Leaflet requires container elements to be compiled and rendered
            setTimeout(() => {
                const mapEl = document.getElementById('map-workspace');
                if (!mapEl) return;

                // Reset existing maps if switched
                if (leafletMapInstance) {
                    leafletMapInstance.remove();
                    leafletMapInstance = null;
                }

                // Instantiate Leaflet focusing on Central Nepal coordinates
                leafletMapInstance = L.map('map-workspace', { zoomControl: false }).setView([27.85, 84.5], 8);
                
                L.control.zoom({ position: 'bottomright' }).addTo(leafletMapInstance);

                // Use clean, open gray basemap (CartoDB Positron tiles match professional corporate design themes)
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    maxZoom: 18,
                    attribution: '&copy; CartoDB &copy; OpenStreetMap'
                }).addTo(leafletMapInstance);

                // Render station depots
                const stations = [
                    { name: "Kathmandu Terminal Desk", coords: [27.7172, 85.3240] },
                    { name: "Butwal Central Counter", coords: [27.7006, 83.4484] },
                    { name: "Tamghas Outpost Counter", coords: [27.9858, 83.2553] }
                ];

                stations.forEach(st => {
                    L.marker(st.coords, {
                        icon: L.divIcon({
                            html: `<div class="bg-white border border-slate-300 shadow-sm text-slate-800 text-[9px] font-bold px-1 rounded whitespace-nowrap">🏢 ${st.name}</div>`,
                            className: 'station-label-node',
                            iconSize: [120, 18]
                        })
                    }).addTo(leafletMapInstance);
                });

                // Plot vehicles dynamic routes
                appState.vehicles.forEach(v => {
                    // Check counters filters
                    if (appState.countersFilter !== 'all' && v.origin !== appState.countersFilter && v.destination !== appState.countersFilter) {
                        return;
                    }

                    // Draw route segments lines
                    const routePathCoords = [
                        [27.9858, 83.2553], // Tamghas
                        [27.8643, 83.5492], // Bartung
                        [27.7006, 83.4484], // Butwal
                        [27.8114, 84.5582], // Mugling
                        [27.7172, 85.3240]  // Kathmandu
                    ];

                    L.polyline(routePathCoords, {
                        color: '#64748b',
                        weight: 1,
                        dashArray: '4, 4'
                    }).addTo(leafletMapInstance);

                    // Add dynamic vehicle marker
                    const marker = L.marker(v.latlng, {
                        icon: L.divIcon({
                            html: `
                                <div class="bg-slate-900 border border-slate-700 text-white shadow-md text-[9px] font-bold p-1 rounded whitespace-nowrap flex items-center space-x-1">
                                    <span>🚌</span>
                                    <span>${v.regNo}</span>
                                </div>
                            `,
                            className: 'vehicle-label-node',
                            iconSize: [80, 20],
                            iconAnchor: [40, 10]
                        })
                    });

                    marker.bindPopup(`
                        <div class="font-sans text-[10px] space-y-1">
                            <div class="font-bold text-slate-900 border-b border-slate-200 pb-1">${v.regNo} (${v.model})</div>
                            <div><b>Speed:</b> ${v.speed} km/h</div>
                            <div><b>Battery:</b> ${v.battery}% (${v.range} km)</div>
                            <div><b>Status:</b> [ ${v.status} ]</div>
                        </div>
                    `);

                    marker.addTo(leafletMapInstance);
                });

            }, 200);
        }
    </script>

</body>
</html>
