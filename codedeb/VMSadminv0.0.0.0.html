        // Real-Time Clock Functionality
        function updateClock() {
            const clockEl = document.getElementById('live-clock');
            if (clockEl) {
                const now = new Date();
                let hrs = now.getHours();
                let mins = now.getMinutes();
                let secs = now.getSeconds();
                let ampm = hrs >= 12 ? 'PM' : 'AM';
                hrs = hrs % 12;
                hrs = hrs ? hrs : 12; // key '0' conversion
                mins = mins < 10 ? '0' + mins : mins;
                secs = secs < 10 ? '0' + secs : secs;
                clockEl.textContent = `${hrs}:${mins}:${secs} ${ampm}`;
            }
        }
        setInterval(updateClock, 1000);

        // Core App Initializer
        window.addEventListener('load', () => {
            initApp();
        });

        function initApp() {
            lucide.createIcons();
            switchPage('dashboard');

        // Display Success Notification Toast
        function showToast(title, desc) {
            const toast = document.getElementById('success-toast');
            const toastTitle = document.getElementById('toast-title');
            const toastDesc = document.getElementById('toast-desc');
            
            toastTitle.textContent = title;
            toastDesc.textContent = desc;

            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }, 3500);
        }

        // Router & Sidebar Controller
        function switchPage(pageId) {
            appState.currentPage = pageId;
            
            // Toggle sidebar active highlights
            const sidebarButtons = document.querySelectorAll('aside nav button');
            sidebarButtons.forEach(btn => {
                btn.classList.remove('bg-brand-50', 'text-brand-700', 'font-semibold', 'border-l-4', 'border-brand-600');
                btn.classList.add('text-slate-700', 'hover:bg-slate-50');
            });

            const activeBtn = document.getElementById(`nav-${pageId}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-700', 'hover:bg-slate-50');
                activeBtn.classList.add('bg-brand-50', 'text-brand-700', 'font-semibold', 'border-l-4', 'border-brand-600');
            }

            // Route execution
            renderActivePage();
            lucide.createIcons();
        }

        function filterTerminalContext(val) {
            appState.countersFilter = val;
            showToast('Counter Context Updated', `System switched context views to match: ${val}`);
            renderActivePage();
            lucide.createIcons();
        }

        // Compute Dynamic Real-time Calculations
        function getCalculatedMetrics() {
            let totalPassengers = 0;
            let occupiedCount = 0;
            let totalCapacity = 0;
            let totalRevenue = 0;
            let inTransitCount = 0;
            let boardingCount = 0;
            let delayedCount = 0;
            let parkedCount = 0;
            let overspeedCount = 0;

            const baseFarePerPassenger = 1550; // NPR

            appState.vehicles.forEach(v => {
                // Counter context filtering logic
                if (appState.countersFilter !== 'all' && v.origin !== appState.countersFilter && v.destination !== appState.countersFilter) {
                    return;
                }

                totalCapacity += v.capacity;
                v.seats.forEach(s => {
                    if (s.status === 'occupied' || s.status === 'reserved') {
                        occupiedCount++;
                        totalRevenue += baseFarePerPassenger;
                    }
                });

                if (v.status === 'In Transit') inTransitCount++;
                if (v.status === 'Boarding') boardingCount++;
                if (v.status === 'Delayed') delayedCount++;
                if (v.status === 'Parked') parkedCount++;
                overspeedCount += v.overspeedCount;
            });

            return {
                occupiedCount,
                totalCapacity,
                totalRevenue,
                inTransitCount,
                boardingCount,
                delayedCount,
                parkedCount,
                overspeedCount
            };
        }

        function renderActivePage() {
            const viewport = document.getElementById('main-content-viewport');
            const metrics = getCalculatedMetrics();

            // Auto sync sidebar stats indicators with calculated state values
            const departureBadge = document.getElementById('sidebar-departure-badge');
            if (departureBadge) {
                departureBadge.textContent = `${metrics.boardingCount} Boarding`;

            switch (appState.currentPage) {
                case 'dashboard':
                    viewport.innerHTML = getDashboardHTML(metrics);
                    break;
                case 'departure':
                    viewport.innerHTML = getDepartureBoardHTML(metrics);
                    break;
                case 'vehicles':
                    viewport.innerHTML = getLiveVehiclesHTML();
                    break;
                case 'routes':
                    viewport.innerHTML = getRoutesHTML();
                    break;
                case 'drivers':
                    viewport.innerHTML = getDriversHTML();
                    break;
                case 'trips':
                    viewport.innerHTML = getTripsHTML();
                    break;
                case 'notifications':
                    viewport.innerHTML = getNotificationsHTML();
                    break;
                case 'reports':
                    viewport.innerHTML = getReportsHTML();
                    break;
                case 'settings':
                    viewport.innerHTML = getSettingsHTML();
                    break;
                default:
                    viewport.innerHTML = `<div class="p-6">Page under construction</div>`;
            }
        }

            const drop = document.getElementById('bk-drop').value;

            const v = appState.vehicles.find(veh => veh.id === vehicleId);

                    targetSeat.drop = drop;
