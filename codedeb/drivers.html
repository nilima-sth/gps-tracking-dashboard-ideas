<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <title>Drivers - CodeDeb Fleet System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
</head>
<body class="h-full flex flex-col overflow-hidden text-slate-700">

    <!-- TOP HEADER Accents -->
    <header id="header-target" class="h-14 bg-[#0b192f] flex items-center justify-between px-4 shrink-0 z-40 text-white"></header>

    <div class="flex-1 flex overflow-hidden">
        <!-- APP SIDEBAR -->
        <aside id="sidebar-target" class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0 z-30"></aside>

        <!-- DATA MATRIX PORT -->
        <main class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="border-b border-slate-200 pb-2.5 flex justify-between items-center">
                <div>
                    <h1 class="text-base font-bold text-slate-900 tracking-tight">Drivers Directory</h1>
                    <p class="text-[11px] text-slate-500"> Roster index of active vehicle operators, driving licenses, and vehicle assignments.</p>
                </div>
                <div class="max-w-xs w-full flex items-center border border-slate-200 bg-white rounded px-2.5 py-1">
                    <i data-lucide="search" class="w-3.5 h-3.5 text-slate-400 mr-2"></i>
                    <input type="text" id="driverSearch" oninput="searchDriversRegistry()" placeholder="Search by operator name..." class="text-xs focus:outline-none w-full bg-transparent">
                </div>
            </div>

            <!-- DRILL-DOWN ROSTER SHEET -->
            <div class="bg-white border border-slate-200 rounded shadow-sm overflow-hidden">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-50 text-slate-500 border-b border-slate-200 text-[10px] uppercase font-bold tracking-wider">
                        <tr>
                            <th class="p-2.5 pl-3">Operator Name</th>
                            <th class="p-2.5">Mobile Phone Number</th>
                            <th class="p-2.5">Assigned EV</th>
                            <th class="p-2.5">License ID</th>
                            <th class="p-2.5">Mechanical Inspection</th>
                            <th class="p-2.5 text-right pr-3">Duty Log</th>
                        </tr>
                    </thead>
                    <tbody id="drivers-registry-rows" class="divide-y divide-slate-100 font-medium text-slate-800"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let registryVehicles = [];

        document.addEventListener("DOMContentLoaded", () => {
            const db = getDatabase();
            registryVehicles = db.vehicles;
            renderDriversRegistry(registryVehicles);
            lucide.createIcons();
        });

        function renderDriversRegistry(list) {
            const tbody = document.getElementById("drivers-registry-rows");
            tbody.innerHTML = list.map((v, index) => `
                <tr class="hover:bg-slate-50 cursor-pointer transition" onclick="showDriverDrawer('${v.driver}')">
                    <td class="p-2.5 pl-3">
                        <div class="font-bold text-slate-900">${v.driver}</div>
                        <div class="text-[9px] text-slate-400 font-mono-data">EMP-#CD-${200 + index}</div>
                    </td>
                    <td class="p-2.5 font-mono-data text-slate-700">${v.driverPhone}</td>
                    <td class="p-2.5">
                        <span class="text-blue-700 font-bold hover:underline" onclick="event.stopPropagation(); showVehicleDrawer('${v.id}')">${v.regNo}</span>
                        <span class="text-[9px] text-slate-400 font-mono-data block">${v.id}</span>
                    </td>
                    <td class="p-2.5 font-mono-data text-slate-600">${v.driverLicense}</td>
                    <td class="p-2.5">
                        <span class="text-[9px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-100 px-1.5 py-0.5 rounded uppercase">TYRES: ${v.checklist.tyres} | BRAKES: ${v.checklist.brakes}</span>
                    </td>
                    <td class="p-2.5 text-right pr-3 font-bold text-emerald-600">[ Active Duty ]</td>
                </tr>
            `).join('');
        }

        function searchDriversRegistry() {
            const term = document.getElementById("driverSearch").value.toLowerCase();
            const filtered = registryVehicles.filter(v => 
                v.driver.toLowerCase().includes(term) || 
                v.driverPhone.includes(term) ||
                v.regNo.toLowerCase().includes(term)
            );
            renderDriversRegistry(filtered);
        }
    </script>
</body>
</html>
