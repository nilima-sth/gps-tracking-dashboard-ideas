<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owners Directory — CodeDeb VMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
</head>
<body class="h-full flex flex-col overflow-hidden text-slate-700">

    <header id="header-target" class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0 z-40"></header>

    <div class="flex-1 flex overflow-hidden">
        <aside id="sidebar-target" class="w-60 bg-white border-r border-slate-200 flex flex-col shrink-0 z-30"></aside>

        <!-- MAIN OWNER GRID -->
        <main class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="border-b border-slate-200 pb-2">
                <h1 class="text-sm font-bold text-slate-900 tracking-tight">Active Enterprise Fleet Owners</h1>
                <p class="text-[11px] text-slate-400">Registry mapping vehicle ownership licenses, assigned vehicles, and relative performance status indices.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3" id="owners-deck"></div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const db = getDatabase();
            renderOwnersGrid(db);
            lucide.createIcons();
        });

        function renderOwnersGrid(db) {
            const ownersMap = {};
            
            db.vehicles.forEach(v => {
                if (!ownersMap[v.owner]) {
                    ownersMap[v.owner] = {
                        name: v.owner,
                        activeVehicles: [],
                        totalYield: 0
                    };
                }
                ownersMap[v.owner].activeVehicles.push(v.regNo);
                ownersMap[v.owner].totalYield += v.netRevenue;
            });

            const container = document.getElementById("owners-deck");
            container.innerHTML = Object.values(ownersMap).map(owner => `
                <div class="bg-white border border-slate-200 rounded p-4 flex flex-col justify-between shadow-sm space-y-3.5">
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-start">
                            <h3 class="text-xs font-extrabold text-slate-900 truncate pr-2">${owner.name}</h3>
                            <span class="text-[9px] bg-slate-100 text-slate-600 border border-slate-200 font-bold px-1.5 py-0.5 rounded font-mono-data">${owner.activeVehicles.length} EVs</span>
                        </div>
                        <div>
                            <span class="text-[9px] text-slate-400 uppercase tracking-wider font-bold block mb-1">Assigned Vehicles</span>
                            <div class="flex flex-wrap gap-1">
                                ${owner.activeVehicles.slice(0, 3).map(v => `
                                    <span class="text-[9px] bg-sky-50 text-sky-800 font-mono-data px-1.5 py-0.5 rounded font-semibold border border-sky-100">${v}</span>
                                `).join('')}
                                ${owner.activeVehicles.length > 3 ? `<span class="text-[9px] text-slate-400 self-center font-bold pl-1">+${owner.activeVehicles.length - 3} more</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-slate-100 pt-2.5 flex justify-between items-center text-xs">
                        <span class="text-slate-400 font-semibold">Total Audited Yield</span>
                        <span class="font-bold text-slate-900 font-mono-data">NPR ${owner.totalYield.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
